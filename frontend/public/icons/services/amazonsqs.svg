<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="8" fill="#232F3E"/>
  <g transform="translate(14, 14)">
    <!-- Queue: stacked message rectangles -->
    <!-- Back message -->
    <rect x="6" y="2" width="28" height="10" rx="2" fill="#FF9900" opacity="0.4"/>
    <!-- Middle message -->
    <rect x="3" y="9" width="28" height="10" rx="2" fill="#FF9900" opacity="0.7"/>
    <!-- Front message -->
    <rect x="0" y="16" width="28" height="10" rx="2" fill="#FF9900"/>
    <!-- Lines on front message -->
    <line x1="4" y1="20" x2="18" y2="20" stroke="#232F3E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="23" x2="14" y2="23" stroke="#232F3E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Arrow indicating queue flow -->
    <path d="M32 21L36 21M36 21L33 18M36 21L33 24" stroke="#FF9900" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
