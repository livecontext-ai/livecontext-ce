<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="8" fill="#232F3E"/>
  <g transform="translate(12, 12)">
    <!-- Table shape: cylinder/database icon -->
    <ellipse cx="20" cy="10" rx="16" ry="6" fill="#4053D6" opacity="0.9"/>
    <rect x="4" y="10" width="32" height="20" fill="#4053D6" opacity="0.9"/>
    <ellipse cx="20" cy="30" rx="16" ry="6" fill="#4053D6" opacity="0.9"/>
    <!-- Top ellipse highlight -->
    <ellipse cx="20" cy="10" rx="16" ry="6" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.5"/>
    <!-- Side lines -->
    <line x1="4" y1="10" x2="4" y2="30" stroke="#FFFFFF" stroke-width="1.2" opacity="0.5"/>
    <line x1="36" y1="10" x2="36" y2="30" stroke="#FFFFFF" stroke-width="1.2" opacity="0.5"/>
    <!-- Middle partition lines (table rows) -->
    <ellipse cx="20" cy="18" rx="16" ry="5" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.35"/>
    <ellipse cx="20" cy="24" rx="16" ry="5.5" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.35"/>
    <!-- Key icon (small) -->
    <circle cx="20" cy="10" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <line x1="22.5" y1="10" x2="27" y2="10" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="25" y1="10" x2="25" y2="12.5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="27" y1="10" x2="27" y2="12.5" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>
  </g>
</svg>
