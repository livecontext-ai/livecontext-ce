    <line x1="0" y1="10" x2="44" y2="10" stroke="white" stroke-width="2.5"/>
    <!-- Browser dots -->
    <circle cx="7" cy="5" r="1.8" fill="white"/>
    <circle cx="13" cy="5" r="1.8" fill="white"/>
    <circle cx="19" cy="5" r="1.8" fill="white"/>
    <!-- Screenshot/camera icon in center -->
    <rect x="14" y="16" width="16" height="14" rx="2.5" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="22" cy="23.5" r="3.5" fill="none" stroke="white" stroke-width="1.8"/>
