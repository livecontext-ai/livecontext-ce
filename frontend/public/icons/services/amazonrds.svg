<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: rounded rectangle, AWS dark navy -->
  <rect width="256" height="256" rx="32" ry="32" fill="#232F3E"/>

  <!-- Primary cylinder body -->
  <!-- Top ellipse cap -->
  <ellipse cx="128" cy="82" rx="64" ry="20" fill="#527FFF"/>
  <!-- Cylinder sides -->
  <rect x="64" y="82" width="128" height="96" fill="#3A66E0"/>
  <!-- Highlight stripe on cylinder body -->
  <rect x="64" y="82" width="128" height="12" fill="#527FFF" opacity="0.5"/>
  <!-- Bottom ellipse cap -->
  <ellipse cx="128" cy="178" rx="64" ry="20" fill="#2A4DB5"/>

  <!-- Middle ellipse divider (stacked layer effect) -->
  <ellipse cx="128" cy="130" rx="64" ry="20" fill="#3A66E0"/>
  <ellipse cx="128" cy="130" rx="64" ry="20" fill="none" stroke="#527FFF" stroke-width="2" opacity="0.7"/>

  <!-- Top ellipse re-draw on top for clean cap -->
  <ellipse cx="128" cy="82" rx="64" ry="20" fill="#527FFF"/>

  <!-- Shine highlight on top cap -->
  <ellipse cx="112" cy="78" rx="28" ry="8" fill="#7FA8FF" opacity="0.35"/>

  <!-- Three horizontal lines on cylinder body suggesting data layers -->
  <line x1="80" y1="104" x2="176" y2="104" stroke="#527FFF" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="130" x2="176" y2="130" stroke="#527FFF" stroke-width="2" opacity="0.5"/>
  <line x1="80" y1="156" x2="176" y2="156" stroke="#527FFF" stroke-width="2" opacity="0.5"/>

  <!-- Small stacked database accent: second smaller cylinder behind/below -->
  <ellipse cx="128" cy="198" rx="44" ry="13" fill="#1E3A8A" opacity="0.7"/>
  <rect x="84" y="198" width="88" height="18" fill="#1B348A" opacity="0.5"/>
  <ellipse cx="128" cy="216" rx="44" ry="13" fill="#162B70" opacity="0.7"/>
</svg>
