<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a7bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <clipPath id="a7clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a7bg)"/>

  <!-- === SINE WAVE SHEETS === -->
  <g clip-path="url(#a7clip)">
    <!-- Wave 1: upper -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;-40,0" dur="12s" repeatCount="indefinite"/>
      <path d="M-40,25 Q-30,21 -20,25 T0,25 T20,25 T40,25 T60,25 T80,25 T100,25 T120,25 T140,25" stroke="white" stroke-width="0.8" fill="none" opacity="0.18">
        <animate attributeName="d" values="M-40,25 Q-30,21 -20,25 T0,25 T20,25 T40,25 T60,25 T80,25 T100,25 T120,25 T140,25;M-40,25 Q-30,29 -20,25 T0,25 T20,25 T40,25 T60,25 T80,25 T100,25 T120,25 T140,25;M-40,25 Q-30,21 -20,25 T0,25 T20,25 T40,25 T60,25 T80,25 T100,25 T120,25 T140,25" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Wave 2: middle -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;-40,0" dur="18s" repeatCount="indefinite"/>
      <path d="M-40,55 Q-30,60 -20,55 T0,55 T20,55 T40,55 T60,55 T80,55 T100,55 T120,55 T140,55" stroke="white" stroke-width="0.7" fill="none" opacity="0.14">
        <animate attributeName="d" values="M-40,55 Q-30,60 -20,55 T0,55 T20,55 T40,55 T60,55 T80,55 T100,55 T120,55 T140,55;M-40,55 Q-30,50 -20,55 T0,55 T20,55 T40,55 T60,55 T80,55 T100,55 T120,55 T140,55;M-40,55 Q-30,60 -20,55 T0,55 T20,55 T40,55 T60,55 T80,55 T100,55 T120,55 T140,55" dur="7s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Wave 3: lower -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="-40,0;0,0" dur="15s" repeatCount="indefinite"/>
      <path d="M-40,82 Q-30,78 -20,82 T0,82 T20,82 T40,82 T60,82 T80,82 T100,82 T120,82 T140,82" stroke="white" stroke-width="0.8" fill="none" opacity="0.16">
        <animate attributeName="d" values="M-40,82 Q-30,78 -20,82 T0,82 T20,82 T40,82 T60,82 T80,82 T100,82 T120,82 T140,82;M-40,82 Q-30,86 -20,82 T0,82 T20,82 T40,82 T60,82 T80,82 T100,82 T120,82 T140,82;M-40,82 Q-30,78 -20,82 T0,82 T20,82 T40,82 T60,82 T80,82 T100,82 T120,82 T140,82" dur="8s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Tall oval eyes -->
  <ellipse cx="39" cy="44" rx="4.5" ry="7" fill="white" opacity="0.9">
    <animate attributeName="ry" values="7;7;0.5;7;7" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="44" rx="4.5" ry="7" fill="white" opacity="0.9">
    <animate attributeName="ry" values="7;7;0.5;7;7" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Playful asymmetric smile -->
  <path d="M40,58 Q52,66 62,57" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
