<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a25bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9F1239"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <clipPath id="a25clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a25bg)"/>
  <!-- Slow-spin rose: 6 petal ellipses rotating as one unit -->
  <g clip-path="url(#a25clip)">
    <g opacity="0.12" fill="white">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite"/>
      <ellipse cx="50" cy="25" rx="1.6" ry="8"/>
      <ellipse cx="50" cy="25" rx="1.6" ry="8" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="25" rx="1.6" ry="8" transform="rotate(120 50 50)"/>
      <ellipse cx="50" cy="25" rx="1.6" ry="8" transform="rotate(180 50 50)"/>
      <ellipse cx="50" cy="25" rx="1.6" ry="8" transform="rotate(240 50 50)"/>
      <ellipse cx="50" cy="25" rx="1.6" ry="8" transform="rotate(300 50 50)"/>
    </g>
    <!-- Fixed sparkle -->
    <circle cx="82" cy="30" r="1" fill="white" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.7s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;1.4;1" dur="3.7s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Elegant almond eyes -->
  <ellipse cx="39" cy="45" rx="6" ry="3.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="3.5;3.5;0.3;3.5;3.5" keyTimes="0;0.88;0.92;0.96;1" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="45" rx="6" ry="3.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="3.5;3.5;0.3;3.5;3.5" keyTimes="0;0.88;0.92;0.96;1" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Refined subtle smile -->
  <path d="M43,58 Q50,62 57,58" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
