<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a23bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#FF8A65"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a23bg)"/>
  <!-- Warm glow pulses -->
  <g fill="white">
    <circle cx="26" cy="30" r="18" opacity="0.08">
      <animate attributeName="r" values="18;22;18" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.1;0.06" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="74" cy="74" r="24" opacity="0.08">
      <animate attributeName="r" values="24;29;24" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.06;0.1" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Warm cute round eyes -->
  <ellipse cx="39" cy="44" rx="5.5" ry="6" fill="white" opacity="0.9">
    <animate attributeName="ry" values="6;6;0.5;6;6" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="44" rx="5.5" ry="6" fill="white" opacity="0.9">
    <animate attributeName="ry" values="6;6;0.5;6;6" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Sweet cozy smile -->
  <path d="M40,58 Q50,65 60,58" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
