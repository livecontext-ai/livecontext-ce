<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a29bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a29bg)"/>
  <!-- Crystal lattice: 6 tiny triangles at fixed positions, each twinkling opacity on staggered rhythms -->
  <g>
    <polygon points="0,-2.2 1.9,1.1 -1.9,1.1" fill="white" opacity="0.3" transform="translate(22,26)">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-2 1.7,1 -1.7,1" fill="white" opacity="0.3" transform="translate(78,22)">
      <animate attributeName="opacity" values="0.2;0.45;0.2" dur="3.1s" begin="-0.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-2.4 2.1,1.2 -2.1,1.2" fill="white" opacity="0.3" transform="translate(30,74)">
      <animate attributeName="opacity" values="0.18;0.4;0.18" dur="2.8s" begin="-1.2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-2 1.7,1 -1.7,1" fill="white" opacity="0.3" transform="translate(72,78)">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.6s" begin="-0.3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-1.8 1.6,0.9 -1.6,0.9" fill="white" opacity="0.3" transform="translate(16,54)">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2.2s" begin="-1.6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-2.2 1.9,1.1 -1.9,1.1" fill="white" opacity="0.3" transform="translate(84,50)">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.3s" begin="-2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-2 1.7,1 -1.7,1" fill="white" opacity="0.3" transform="translate(50,18)">
      <animate attributeName="opacity" values="0.18;0.42;0.18" dur="2.6s" begin="-0.9s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- Crystal clear round eyes -->
  <ellipse cx="39" cy="44" rx="5" ry="5.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5.5;5.5;0.5;5.5;5.5" keyTimes="0;0.88;0.92;0.96;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="44" rx="5" ry="5.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5.5;5.5;0.5;5.5;5.5" keyTimes="0;0.88;0.92;0.96;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Cool gentle smile -->
  <path d="M41,58 Q50,64 59,58" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.75"/>
</svg>
