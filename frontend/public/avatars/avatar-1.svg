<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#a1bg)"/>

  <!-- Subtle outer dashed ring -->
  <g opacity="0.2">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite"/>
    <circle cx="50" cy="50" r="42" fill="none" stroke="white" stroke-width="0.8" stroke-dasharray="4 8"/>
  </g>

  <!-- Rotating rounded square 1 (clockwise) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
    <rect x="26" y="26" width="48" height="48" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Rotating rounded square 2 (counter-clockwise, offset 45deg) -->
  <g transform="rotate(45 50 50)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="-360 50 50" dur="25s" repeatCount="indefinite"/>
      <rect x="26" y="26" width="48" height="48" rx="8" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.2"/>
    </g>
  </g>

  <!-- === FACE === -->

  <!-- Left eye -->
  <ellipse cx="39" cy="44" rx="5" ry="5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5;5;0.5;5;5" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right eye -->
  <ellipse cx="61" cy="44" rx="5" ry="5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5;5;0.5;5;5" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Mouth (gentle smile) -->
  <path d="M40,58 Q50,64 60,58" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- === ORBITING PARTICLES === -->

  <!-- Particle 1 (fast) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="7s" repeatCount="indefinite"/>
    <circle cx="50" cy="12" r="2.5" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Particle 2 (medium) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 50 50" to="480 50 50" dur="10s" repeatCount="indefinite"/>
    <circle cx="50" cy="15" r="1.8" fill="#DDD6FE" opacity="0.5"/>
  </g>

  <!-- Particle 3 (slow) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 50 50" to="600 50 50" dur="14s" repeatCount="indefinite"/>
    <circle cx="50" cy="10" r="2" fill="#A78BFA" opacity="0.6"/>
  </g>

  <!-- Floating triangle accent -->
  <g opacity="0.2">
    <polygon points="20,24 24,18 28,24" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;1.5,-1.5;0,0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>
