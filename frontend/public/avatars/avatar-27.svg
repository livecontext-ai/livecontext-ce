<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a27bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
    <clipPath id="a27clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a27bg)"/>
  <!-- Drifting leaves: 4 tiny leaf ellipses translating diagonally with gentle rotation, wrapping within disc -->
  <g clip-path="url(#a27clip)">
    <g opacity="0.12">
      <ellipse cx="0" cy="0" rx="3" ry="1.2" fill="white" transform="rotate(30)"/>
      <animateTransform attributeName="transform" type="translate" values="10,90;110,-10" dur="14s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.15">
      <ellipse cx="0" cy="0" rx="2.4" ry="1" fill="white" transform="rotate(-20)"/>
      <animateTransform attributeName="transform" type="translate" values="-10,60;100,-30" dur="18s" begin="-4s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.1">
      <ellipse cx="0" cy="0" rx="3.2" ry="1.3" fill="white" transform="rotate(45)"/>
      <animateTransform attributeName="transform" type="translate" values="30,110;120,20" dur="12s" begin="-2s" repeatCount="indefinite"/>
    </g>
    <g opacity="0.13">
      <ellipse cx="0" cy="0" rx="2.6" ry="1.1" fill="white" transform="rotate(15)"/>
      <animateTransform attributeName="transform" type="translate" values="-20,30;90,-50" dur="16s" begin="-7s" repeatCount="indefinite"/>
    </g>
  </g>
  <!-- Nature-round eyes -->
  <ellipse cx="39" cy="44" rx="5" ry="5.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5.5;5.5;0.5;5.5;5.5" keyTimes="0;0.89;0.93;0.97;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="44" rx="5" ry="5.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5.5;5.5;0.5;5.5;5.5" keyTimes="0;0.89;0.93;0.97;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Warm earthy smile -->
  <path d="M39,58 Q50,66 61,58" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75"/>
</svg>
