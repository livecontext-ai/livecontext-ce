<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a26bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="a26trail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="a26clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a26bg)"/>
  <!-- Neon trace ring: slowly rotating dashed ring with two breathing accent dots -->
  <g>
    <circle cx="50" cy="50" r="42" fill="none" stroke="#22D3EE" stroke-width="0.9" stroke-dasharray="3,4" opacity="0.18">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="8" r="1.2" fill="#22D3EE" opacity="0.35">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="92" r="1.2" fill="#22D3EE" opacity="0.35">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Glowing dot eyes -->
  <circle cx="40" cy="45" r="4" fill="#22D3EE" opacity="0.9">
    <animate attributeName="r" values="4;4;0.5;4;4" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="45" r="6" fill="#22D3EE" opacity="0.1">
    <animate attributeName="r" values="6;6;1;6;6" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="45" r="4" fill="#22D3EE" opacity="0.9">
    <animate attributeName="r" values="4;4;0.5;4;4" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="45" r="6" fill="#22D3EE" opacity="0.1">
    <animate attributeName="r" values="6;6;1;6;6" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Cool minimal smile -->
  <path d="M43,58 Q50,62 57,58" stroke="#22D3EE" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
