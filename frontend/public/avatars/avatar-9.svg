<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a9bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="100%" stop-color="#57534E"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a9bg)"/>
  <!-- Minimal zen arc: a slowly rotating incomplete ring around the face -->
  <path d="M 50 12 A 38 38 0 1 1 20 38" fill="none" stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.15">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="45s" repeatCount="indefinite"/>
  </path>
  <!-- Two tiny breathing edge dots on staggered rhythms -->
  <circle cx="85" cy="50" r="1" fill="white" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="66" r="0.9" fill="white" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6.2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Simple dot eyes -->
  <circle cx="41" cy="45" r="3.5" fill="white" opacity="0.85">
    <animate attributeName="r" values="3.5;3.5;0.5;3.5;3.5" keyTimes="0;0.9;0.93;0.96;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="59" cy="45" r="3.5" fill="white" opacity="0.85">
    <animate attributeName="r" values="3.5;3.5;0.5;3.5;3.5" keyTimes="0;0.9;0.93;0.96;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <!-- Peaceful minimal smile -->
  <path d="M44,57 Q50,61 56,57" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
