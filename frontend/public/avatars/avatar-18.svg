<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a18bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#84CC16"/>
      <stop offset="100%" stop-color="#4D7C0F"/>
    </linearGradient>
    <clipPath id="a18clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a18bg)"/>
  <!-- Blob: a single soft organic shape slowly morphing between forms -->
  <g clip-path="url(#a18clip)">
    <path d="M30,40 Q45,25 65,35 Q80,50 70,68 Q50,78 32,68 Q20,55 30,40 Z" fill="white" opacity="0.08">
      <animate attributeName="d"
        values="M30,40 Q45,25 65,35 Q80,50 70,68 Q50,78 32,68 Q20,55 30,40 Z;
                M35,32 Q55,28 68,42 Q75,60 62,72 Q42,75 28,62 Q22,48 35,32 Z;
                M28,48 Q40,30 62,32 Q78,45 72,64 Q55,76 35,70 Q22,58 28,48 Z;
                M30,40 Q45,25 65,35 Q80,50 70,68 Q50,78 32,68 Q20,55 30,40 Z"
        dur="11s" repeatCount="indefinite"/>
    </path>
    <circle cx="82" cy="24" r="1.1" fill="white" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="80" r="0.9" fill="white" opacity="0.2">
      <animate attributeName="opacity" values="0.15;0.28;0.15" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Leaf-shaped eyes (angled ellipses) -->
  <ellipse cx="39" cy="44" rx="6" ry="4" fill="white" opacity="0.9" transform="rotate(-10 39 44)">
    <animate attributeName="ry" values="4;4;0.3;4;4" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="44" rx="6" ry="4" fill="white" opacity="0.9" transform="rotate(10 61 44)">
    <animate attributeName="ry" values="4;4;0.3;4;4" keyTimes="0;0.88;0.92;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Wide happy smile -->
  <path d="M37,57 Q50,67 63,57" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
