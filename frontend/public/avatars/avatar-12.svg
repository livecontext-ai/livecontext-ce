<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a12bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7F7F"/>
      <stop offset="100%" stop-color="#E05555"/>
    </linearGradient>
    <clipPath id="a12clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a12bg)"/>
  <!-- Rising bubbles: small circles drifting upward with gentle sway, fading near the top -->
  <g clip-path="url(#a12clip)" fill="white">
    <circle cx="22" cy="90" r="1.8" opacity="0">
      <animate attributeName="cy" values="90;10" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="22;24;20;22" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.25;0.25;0" keyTimes="0;0.1;0.8;1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="90" r="1.2" opacity="0">
      <animate attributeName="cy" values="90;10" dur="9s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="38;36;40;38" dur="9s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.22;0.22;0" keyTimes="0;0.1;0.8;1" dur="9s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="90" r="2.2" opacity="0">
      <animate attributeName="cy" values="90;10" dur="8s" begin="2.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="50;52;48;50" dur="8s" begin="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.28;0.28;0" keyTimes="0;0.1;0.8;1" dur="8s" begin="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="64" cy="90" r="1.5" opacity="0">
      <animate attributeName="cy" values="90;10" dur="10s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="64;62;66;64" dur="10s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.25;0.25;0" keyTimes="0;0.1;0.8;1" dur="10s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="76" cy="90" r="1.8" opacity="0">
      <animate attributeName="cy" values="90;10" dur="6.5s" begin="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="76;78;74;76" dur="6.5s" begin="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.22;0.22;0" keyTimes="0;0.1;0.8;1" dur="6.5s" begin="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="90" r="1" opacity="0">
      <animate attributeName="cy" values="90;10" dur="8.5s" begin="4.2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="85;83;87;85" dur="8.5s" begin="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.2;0.2;0" keyTimes="0;0.1;0.8;1" dur="8.5s" begin="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Soft round eyes -->
  <ellipse cx="39" cy="44" rx="5.5" ry="5.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5.5;5.5;0.5;5.5;5.5" keyTimes="0;0.87;0.91;0.95;1" dur="4.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="61" cy="44" rx="5.5" ry="5.5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5.5;5.5;0.5;5.5;5.5" keyTimes="0;0.87;0.91;0.95;1" dur="4.8s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Gentle dreamy smile -->
  <path d="M41,58 Q50,64 59,58" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.75"/>
</svg>
