<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a13bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A51A"/>
      <stop offset="100%" stop-color="#A88315"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a13bg)"/>
  <!-- Concentric sun rings: three nested dashed rings rotating at different slow speeds -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="white" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.1">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="0.7" stroke-dasharray="4 5" opacity="0.14">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="35s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="0.7" stroke-dasharray="1 4" opacity="0.08">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="50s" repeatCount="indefinite"/>
  </circle>
  <!-- Warm round eyes -->
  <ellipse cx="40" cy="44" rx="5" ry="5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5;5;0.5;5;5" keyTimes="0;0.89;0.92;0.95;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="60" cy="44" rx="5" ry="5" fill="white" opacity="0.9">
    <animate attributeName="ry" values="5;5;0.5;5;5" keyTimes="0;0.89;0.92;0.95;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Cozy warm smile -->
  <path d="M39,58 Q50,66 61,58" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
