<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="a15bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8A9E8"/>
      <stop offset="100%" stop-color="#9484D1"/>
    </linearGradient>
    <clipPath id="a15clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#a15bg)"/>
  <!-- Specks: tiny dots drifting in unique directions with opacity breathing -->
  <g clip-path="url(#a15clip)">
    <circle cx="22" cy="30" r="1.2" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;6,-3;0,0" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="78" cy="25" r="0.9" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;-5,4;0,0" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="70" r="1.4" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;-4,-5;0,0" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="72" cy="75" r="1.0" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-4;0,0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="60" r="0.8" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;3,5;0,0" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="55" r="1.1" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;-6,2;0,0" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="20" r="0.9" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;2,6;0,0" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="82" r="1.3" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;-3,-6;0,0" dur="13.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="28" cy="48" r="0.8" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;4,3;0,0" dur="12.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="82" cy="42" r="1.1" fill="white">
      <animateTransform attributeName="transform" type="translate" values="0,0;-5,-2;0,0" dur="14.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Wide eyes with highlight -->
  <ellipse cx="39" cy="44" rx="5.5" ry="6" fill="white" opacity="0.9">
    <animate attributeName="ry" values="6;6;0.5;6;6" keyTimes="0;0.88;0.92;0.96;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="37" cy="42" r="1.5" fill="#E8E2F8" opacity="0.5"/>
  <ellipse cx="61" cy="44" rx="5.5" ry="6" fill="white" opacity="0.9">
    <animate attributeName="ry" values="6;6;0.5;6;6" keyTimes="0;0.88;0.92;0.96;1" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="59" cy="42" r="1.5" fill="#E8E2F8" opacity="0.5"/>
  <!-- Knowing smile -->
  <path d="M41,58 Q50,64 59,58" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.75"/>
</svg>
