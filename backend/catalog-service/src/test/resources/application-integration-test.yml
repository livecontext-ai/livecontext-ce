# Integration Test Configuration - Catalog Service
# Uses H2 in-memory database with PostgreSQL compatibility mode
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: catalog-service-integration-test

  datasource:
    url: jdbc:h2:mem:catalog_integration;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Disable AI features for integration tests
ai:
  mapping:
    enabled: false
    provider: deepinfra
    deepinfra:
      token: ""
      url: https://fake.deepinfra.com/v1/openai/chat/completions
      model: test-model
      temperature: 0.0
      max_tokens: 100
      context:
        window-size: 4096
        max-tokens: 100
        array-sample-size: 1
        max-file-size: 10000
        chunk-size: 512
        preserve-structure: true
        max-string-length: 50
        min-occurrences-for-reference: 3
        min-length-for-reference: 50
  description:
    enabled: false
    provider: deepinfra
    deepinfra:
      token: ""
      url: https://fake.deepinfra.com/v1/openai/chat/completions
      model: test-model
      temperature: 0.3
      max_tokens: 100
      context:
        window-size: 4096
        max-tokens: 100
        array-sample-size: 2
        max-file-size: 20000
        chunk-size: 1024
        preserve-structure: true
        max-string-length: 200

# Disable OpenAI for integration tests
openai:
  api-key: ""
  timeout: 5
  embedding-model: text-embedding-3-large

# Search config
search:
  rrf:
    k: 60
    knn-weight: 0.6
    lexical-weight: 0.4
  auto-pick:
    margin-ratio: 1.3
    min-score: 0.015
  reranking:
    enabled: false
    top-k: 5
    model: cross-encoder
  query-understanding:
    enabled: false
    extract-hints: false

# Disable scheduling for integration tests
scheduling:
  server-monitoring-interval: 999999999
  tool-score-update-interval: 999999999
  tool-discovery-interval: 999999999
  server-cleanup-interval: 999999999

# Cache config
cache:
  ttl:
    mcp-servers: 1
    tool-schemas: 1
    server-health: 1
    rate-limit-window: 1

# Server config
server:
  port: 0

# HTTP client
http:
  client:
    connect-timeout: 1000
    read-timeout: 5000

# Vectorization
catalog:
  vectorization:
    executor:
      pool-size: 1
    min-interval-ms: 0

# Disable gateway HMAC verification for integration tests
gateway:
  filter:
    verification-enabled: false

logging:
  level:
    com.apimarketplace: DEBUG
    org.springframework.data.jdbc: DEBUG
    org.springframework.jdbc: DEBUG
