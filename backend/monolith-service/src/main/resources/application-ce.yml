      # DeepSeek
      - { provider: deepseek, model: deepseek-chat,     inputRate: 0.28, outputRate: 0.42 }
      - { provider: deepseek, model: deepseek-coder,    inputRate: 0.28, outputRate: 0.42 }
      - { provider: deepseek, model: deepseek-reasoner, inputRate: 0.28, outputRate: 0.42 }

# Billing: disabled in CE (no Stripe). A self-hosted CE install bills at the REAL
# provider price - NO gross margin. The managed-cloud 1.8x LLM multiplier
# (billing.llm.cloud-multiplier, ModelPricingService) and the platform-credential
# markup are cloud REVENUE levers; they must NOT apply to a self-hosted install, so
# here they default to neutral (1.0 / off) and the recorded/displayed consumption is
# the true provider cost. The per-provider cache weights in ModelPricingService are
# left at their defaults on purpose - they mirror the providers' REAL cache pricing
# (e.g. Anthropic cache-read 0.1x), so keeping them makes recorded consumption the
# true cache-weighted provider cost, not a flat per-token approximation. Both levers
# stay env-overridable for a CE operator who deliberately resells with a margin.
billing:
  provider: none
  llm:
    cloud-multiplier: ${BILLING_LLM_CLOUD_MULTIPLIER:1.0}
  stripe:
    secretKey: ""
    webhookSecret: ""
    successUrl: http://localhost:8080
    cancelUrl: http://localhost:8080
    currency: usd
    prices:
      FREE: ""
      STARTER: ""
      PRO: ""
      ENTERPRISE: ""
      PAYG: ""

# Platform-credential markup OFF in CE: no reseller margin on platform-provided
# credentials (mirrors billing.llm.cloud-multiplier=1.0 above - real cost only).
credentials:
  platform:
    markup:
      enabled: ${CREDENTIALS_PLATFORM_MARKUP_ENABLED:false}

# Catalog seed: import OpenAPI specs from directory at boot
catalog:
  seed:
    enabled: ${CATALOG_SEED_ENABLED:true}
    path: ${CATALOG_SEED_PATH:./catalog-seeds}
    owner-id: ${CATALOG_SEED_OWNER_ID:SYSTEM}
  # Shared Ed25519 trust root for ALL signed bundles fetched from the cloud
  # (LLM model bundle AND API catalog bundle). Format: keyId=base64X509;...
  # The cloud's PUBLIC key is baked as the default so a fresh CE / git clone
  # trusts cloud-signed bundles out of the box (no manual config). This is a
  # public key - the cloud serves the same value at /api/catalog-bundles/signing-key;
  # it is NOT a secret. An empty default would make every sync tick record
  # TRUST_UNCONFIGURED. Operators can override or extend (`;`-separated, e.g. for
  # key rotation) via CATALOG_BUNDLE_TRUSTED_KEYS.
  bundle:
    trusted-keys: ${CATALOG_BUNDLE_TRUSTED_KEYS:livecontext-prod-v1=MCowBQYDK2VwAyEAS0Q7EwzPEhGRu2hKzsMeHQqPfQJKpbK7ohjpvnDmmvM=}
    # LLM model-catalog bundle sync (cloud -> CE): keeps the CE model catalog (which
    # models exist + pricing) in step with the cloud's latest signed bundle, on a cron
    # plus once on startup. GATED behind an active cloud link: the scheduler authenticates
    # the download with this install's cloud-link credentials and skips entirely when the
    # install is not linked (records NOT_LINKED) - catalog freshness is a benefit of being
    # connected, never an anonymous fetch. Safe to enable for every CE: an unlinked install
    # simply keeps its seeded catalog. The cloud itself never runs this (default disabled).
    cloud-url: ${CATALOG_BUNDLE_CLOUD_URL:https://livecontext.ai}
    sync:
      enabled: ${CATALOG_BUNDLE_SYNC_ENABLED:true}
      cron: ${CATALOG_BUNDLE_SYNC_CRON:0 */15 * * * *}

# API catalog bundle sync (cloud → CE): the scheduler fetches the signed,
# gzipped API-catalog snapshot from the cloud, verifies the Ed25519 signature
# against catalog.bundle.trusted-keys above, and UPSERT-applies it into
# catalog.* (user-created custom APIs are never touched). Disabled by default
# in the service itself (cloud never syncs); enabled here for CE installs.
api-catalog:
  bundle:
    cloud-url: ${API_CATALOG_BUNDLE_CLOUD_URL:https://livecontext.ai}
    sync:
      enabled: ${API_CATALOG_BUNDLE_SYNC_ENABLED:true}
      cron: ${API_CATALOG_BUNDLE_SYNC_CRON:0 */15 * * * *}

# Skill bundle sync (cloud → CE): the scheduler fetches the signed snapshot of the cloud's
# admin-managed GLOBAL skills, verifies the Ed25519 signature against catalog.bundle.trusted-keys
# above (one shared trust root for every cloud bundle), and UPSERT-applies them into agent.skills
# as read-only, cloud-owned global rows (is_global=true). The cloud marks them is_default_active so
# they auto-activate in new chats for every user; each user hides one for themselves via the
# per-user override. GATED behind an active cloud link (same as the catalog bundle): an unlinked
# install records NOT_LINKED and keeps whatever it has. The cloud itself never runs this (default
# disabled in agent-service); enabled here for CE installs.
skill:
  bundle:
    cloud-url: ${SKILL_BUNDLE_CLOUD_URL:https://livecontext.ai}
    sync:
      enabled: ${SKILL_BUNDLE_SYNC_ENABLED:true}
      cron: ${SKILL_BUNDLE_SYNC_CRON:0 */15 * * * *}

# Model-catalog SEED (boot-time, CE-only): ModelSeedBootstrapService inserts the
# curated models shipped in the agent-service classpath resource
# model-catalog/models.json into agent.model_config_overrides on startup. Edit
# that JSON + commit to ship new models - no new Flyway migration needed. Insert-
# only/additive (never updates or deprecates existing rows); mutations to existing
# models flow via the signed cloud bundle. The cloud never runs this (property
# absent there) - it is the authoritative source of the catalog.
model-catalog:
  seed:
    enabled: ${MODEL_CATALOG_SEED_ENABLED:true}
  # Model execution links (decouple billed identity from CLI-bridge execution) are
  # a CLOUD-only monetization feature. OFF by default in the self-hosted monolith;
  # env-overridable (e.g. for an isolated e2e slot that needs to exercise it).
  execution-links:
    enabled: ${MODEL_EXECUTION_LINKS_ENABLED:false}

# Claude Code bridge - runs on the host machine (needs CLI access)
# In Docker: host.docker.internal resolves to the Docker host
conversation:
  service:
    url: http://localhost:${PORT:8080}
  bridge:
    enabled: ${BRIDGE_ENABLED:true}
    url: ${BRIDGE_SERVICE_URL:http://host.docker.internal:8093}

# Model picker: a CLI-routed provider (claude-code/codex/gemini-cli/mistral-vibe)
# is only offered when the bridge confirms its CLI is installed AND authenticated.
# Strict (default) hides a CLI provider whose availability cannot be verified
# (bridge unreachable / URL unset / CLI not authed). Set false for the legacy
# lenient behaviour (keep CLI providers visible when the bridge is briefly down).
models:
  bridge-availability:
    strict: ${MODELS_BRIDGE_AVAILABILITY_STRICT:true}

# Credential encryption
credential:
  encryption:
    password: ${CREDENTIAL_ENCRYPTION_PASSWORD:}
    salt: ${CREDENTIAL_ENCRYPTION_SALT:}

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.apimarketplace: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOGGING_FILE_NAME:/app/logs/livecontext-ce.log}

# ============================================================
# Actuator
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  metrics:
    enable:
      http.server.requests: false
  endpoint:
    health:
      # when-authorized (not always): /actuator/health is reachable unauthenticated
      # on the published port and must not leak component internals (db/diskSpace/…)
      # to anyone who can reach it. The liveness status (UP/DOWN) is still returned.
      show-details: when-authorized
  health:
    mail:
      enabled: false
    redis:
      enabled: false

# ============================================================
# JVM tuning for CE (target: 800MB RAM)
# Set via JAVA_OPTS: -Xms256m -Xmx512m -XX:+UseZGC
# ============================================================

# ============================================================
# AI Provider configuration (copied from agent-service)
# ============================================================
ai:
  agent:
    # default-model/default-provider removed: resolved dynamically from first AI provider
    cli:
      models:
        opus: claude-opus-4-6
        sonnet: claude-sonnet-4-6
        haiku: claude-haiku-4-5
    providers:
      anthropic:
        enabled: true
        display-order: 1
        api-key: ${ANTHROPIC_API_KEY:}
        api-url: https://api.anthropic.com/v1/messages
        models: claude-opus-4-6,claude-sonnet-4-6,claude-haiku-4-5
      openai:
        enabled: true
        display-order: 2
        api-key: ${OPENAI_API_KEY:}
        api-url: https://api.openai.com/v1/chat/completions
        models: gpt-5.4,gpt-5.4-mini,gpt-5.2,gpt-5,gpt-5-mini,o4-mini
      google:
        enabled: true
        display-order: 3
        api-key: ${GOOGLE_API_KEY:}
        api-url: https://generativelanguage.googleapis.com/v1beta/models
        models: gemini-3-pro-preview,gemini-3-flash-preview
      mistral:
        enabled: true
        display-order: 4
        api-key: ${MISTRAL_API_KEY:}
        api-url: https://api.mistral.ai/v1/chat/completions
        models: mistral-large-latest,mistral-medium-3,mistral-small-latest
      deepseek:
        enabled: true
        display-order: 5
        api-key: ${DEEPSEEK_API_KEY:}
        api-url: https://api.deepseek.com/v1/chat/completions
        models: deepseek-chat,deepseek-coder
      claude-code:
        enabled: ${BRIDGE_CLAUDE_CODE_ENABLED:true}
        display-order: 6
        models: claude-opus-4-7,claude-opus-4-6,claude-sonnet-4-6,claude-sonnet-4-5,claude-haiku-4-5
      codex:
        enabled: ${BRIDGE_CODEX_ENABLED:true}
        display-order: 7
        models: gpt-5.4,gpt-5.4-mini,gpt-5.3-codex
      gemini-cli:
        enabled: ${BRIDGE_GEMINI_CLI_ENABLED:true}
        display-order: 8
        models: gemini-2.5-pro,gemini-2.5-flash,gemini-3.1-pro-preview,gemini-3.1-flash
      mistral-vibe:
        enabled: ${BRIDGE_MISTRAL_VIBE_ENABLED:true}
        display-order: 9
        models: devstral-2,devstral-small-2
    pricing:
      # OpenAI Models
      "[gpt-5.4]":
        input: 2.50
        output: 15.00
      "[gpt-5.4-mini]":
        input: 0.75
        output: 4.50
      "[gpt-5.2]":
        input: 1.75
        output: 14.00
      gpt-5:
        input: 1.25
        output: 10.00
      gpt-5-mini:
        input: 0.25
        output: 2.00
      o4-mini:
        input: 1.10
        output: 4.40
      # Anthropic Models
      claude-opus-4-6:
        input: 5.00
        output: 25.00
      claude-sonnet-4-6:
        input: 3.00
        output: 15.00
      claude-haiku-4-5:
        input: 1.00
        output: 5.00
      # Google Models
      gemini-3-pro-preview:
        input: 1.25
        output: 10.00
      gemini-3-flash-preview:
        input: 0.30
        output: 2.50
      # Mistral Models
      mistral-large-latest:
        input: 2.00
        output: 6.00
      mistral-medium-3:
        input: 0.40
        output: 2.00
      mistral-small-latest:
        input: 0.10
        output: 0.30
      # DeepSeek Models
      deepseek-chat:
        input: 0.28
        output: 0.42
      deepseek-coder:
        input: 0.28
        output: 0.42
      # Bridge models route through the local CLI. Since V130 (Product 2026-04)
      # bridges carry the underlying cloud model's list price for reporting
      # fairness; billing is driven by auth.model_pricing (Flyway-seeded +
      # reconciled by AuthPricingSyncClient on admin edits).
      "[gpt-5.3-codex]":
        input: 2.00
        output: 12.00
      "[gemini-2.5-pro]":
        input: 1.25
        output: 10.00
      "[gemini-2.5-flash]":
        input: 0.30
        output: 2.50
      "[gemini-3.1-pro-preview]":
        input: 1.25
        output: 10.00
      "[gemini-3.1-flash]":
        input: 0.30
        output: 2.50
      # Mistral Vibe bridge models
      devstral-2:
        input: 0.40
        output: 2.00
      devstral-small-2:
        input: 0.10
        output: 0.30
    rankings:
      claude-opus-4-6: 1
      claude-sonnet-4-6: 2
      "[gpt-5.4]": 3
      gemini-3-pro-preview: 4
      "[gpt-5.4-mini]": 5
      claude-haiku-4-5: 6
      gemini-3-flash-preview: 7
      mistral-large-latest: 8
      "[gpt-5.2]": 9
      gpt-5: 10
      gpt-5-mini: 11
      o4-mini: 12
      mistral-medium-3: 13
      mistral-small-latest: 14
      deepseek-chat: 15
      deepseek-coder: 16
      claude-opus-4-7: 17
      "[gpt-5.3-codex]": 20
      "[gemini-2.5-pro]": 21
      "[gemini-2.5-flash]": 22
      "[gemini-3.1-pro-preview]": 23
      "[gemini-3.1-flash]": 24
      devstral-2: 25
      devstral-small-2: 26
