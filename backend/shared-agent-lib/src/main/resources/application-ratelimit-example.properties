# ============================================
# Rate Limiting Configuration Example
# ============================================
#
# This file shows how to configure rate limiting for LLM providers.
# Copy these settings to your main application.properties file.
#
# See the project docs and the project docs for full documentation.

# ============================================
# Enable/Disable Rate Limiting
# ============================================
rate-limit.enabled=true

# ============================================
# Rate Limiting Strategy
# ============================================
# GLOBAL    - All users share the same limits (default)
# PER_TENANT - Each tenant has independent limits
# HYBRID    - Both global AND per-tenant limits (recommended for multi-tenant)
rate-limit.strategy=HYBRID

# ============================================
# Rate Limiting Mode (How to handle limit exceeded)
# ============================================
# WAIT      - Block until rate allows (invisible to caller, recommended)
# FAIL_FAST - Throw exception immediately
# TRY_ACQUIRE - Return result, caller decides (use tryAcquire() method)
rate-limit.default-mode=WAIT

# Maximum wait time for WAIT mode (in seconds)
# If rate limit not available within this time, throws exception
rate-limit.max-wait-time-seconds=60

# ============================================
# OpenAI Rate Limits
# ============================================
# GPT-3.5-turbo typical limits:
#   Free tier: 3 RPM, 40,000 TPM
#   Tier 1: 3,500 RPM, 90,000 TPM
#   Tier 2: 5,000 RPM, 160,000 TPM
# GPT-4 typical limits:
#   Free tier: 3 RPM, 40,000 TPM
#   Tier 1: 500 RPM, 150,000 TPM
#   Tier 2: 5,000 RPM, 300,000 TPM

# Global limits (shared by all tenants)
rate-limit.providers.openai.tokens-per-minute=90000
rate-limit.providers.openai.requests-per-minute=3500

# Per-tenant limits (for PER_TENANT or HYBRID strategy)
rate-limit.providers.openai.tokens-per-minute-per-tenant=10000
rate-limit.providers.openai.requests-per-minute-per-tenant=100

# ============================================
# Anthropic (Claude) Rate Limits
# ============================================
# Claude typical limits:
#   Free tier: 50 RPM, 40,000 TPM
#   Tier 1: 1,000 RPM, 400,000 TPM
#   Tier 2: 2,000 RPM, 800,000 TPM

rate-limit.providers.anthropic.tokens-per-minute=40000
rate-limit.providers.anthropic.requests-per-minute=50
rate-limit.providers.anthropic.tokens-per-minute-per-tenant=5000
rate-limit.providers.anthropic.requests-per-minute-per-tenant=10

# ============================================
# Google (Gemini) Rate Limits
# ============================================
# Gemini typical limits:
#   Free tier: 15 RPM, 32,000 TPM
#   Paid tier: 1,500 RPM, 1,000,000 TPM

rate-limit.providers.google.tokens-per-minute=32000
rate-limit.providers.google.requests-per-minute=30
rate-limit.providers.google.tokens-per-minute-per-tenant=5000
rate-limit.providers.google.requests-per-minute-per-tenant=5

# ============================================
# Mistral AI Rate Limits
# ============================================
# Mistral typical limits vary by model and tier
# Conservative defaults:

rate-limit.providers.mistral.tokens-per-minute=20000
rate-limit.providers.mistral.requests-per-minute=60
rate-limit.providers.mistral.tokens-per-minute-per-tenant=3000
rate-limit.providers.mistral.requests-per-minute-per-tenant=10

# ============================================
# DeepSeek Rate Limits
# ============================================
# DeepSeek typically has higher limits

rate-limit.providers.deepseek.tokens-per-minute=30000
rate-limit.providers.deepseek.requests-per-minute=100
rate-limit.providers.deepseek.tokens-per-minute-per-tenant=5000
rate-limit.providers.deepseek.requests-per-minute-per-tenant=20

# ============================================
# Default Limits
# ============================================
# Applied to providers not explicitly configured above
# Conservative defaults to avoid hitting unknown limits

rate-limit.defaults.tokens-per-minute=10000
rate-limit.defaults.requests-per-minute=60
rate-limit.defaults.tokens-per-minute-per-tenant=1000
rate-limit.defaults.requests-per-minute-per-tenant=10

# ============================================
# Common Configurations
# ============================================

# --- Production Multi-Tenant (Recommended) ---
# rate-limit.strategy=HYBRID
# rate-limit.default-mode=WAIT
# rate-limit.max-wait-time-seconds=60

# --- Development (Fast Fail) ---
# rate-limit.strategy=GLOBAL
# rate-limit.default-mode=FAIL_FAST
# rate-limit.max-wait-time-seconds=5

# --- Single Tenant Production ---
# rate-limit.strategy=GLOBAL
# rate-limit.default-mode=WAIT
# rate-limit.max-wait-time-seconds=120

# ============================================
# Tips
# ============================================
#
# 1. Check your provider dashboard for exact limits
# 2. Set limits to 80% of actual to account for estimation errors
# 3. Monitor logs to see actual vs estimated token usage
# 4. Use -1 to disable limits for a specific type
# 5. Set rate-limit.enabled=false to disable globally
#
# Examples:
#
# Disable global token limit for OpenAI (keep per-tenant):
# rate-limit.providers.openai.tokens-per-minute=-1
#
# Disable per-tenant limit (use global only):
# rate-limit.providers.openai.tokens-per-minute-per-tenant=-1
#
# Disable all limits for development:
# rate-limit.enabled=false
#
# Conservative settings (80% of API limits):
# rate-limit.providers.openai.tokens-per-minute=72000
#
# Monitoring:
# curl http://localhost:8099/api/rate-limits/stats
# curl http://localhost:8099/api/rate-limits/health
# curl http://localhost:8099/api/rate-limits/config
