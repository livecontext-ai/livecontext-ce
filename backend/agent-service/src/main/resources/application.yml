# Agent tool execution
agent:
  webhook:
    base-url: ${AGENT_WEBHOOK_BASE_URL:http://localhost:8080}
  tool:
    default-timeout-ms: 30000
    parallel-execution: true
  task:
    # Task board "Deleted" column retention. TaskRetentionPurger hard-purges tasks
    # soft-deleted (status='deleted') more than `days` ago, in batches of `batch-size`,
    # once a day. Set days very high to keep trashed tasks indefinitely.
    deleted-retention:
      days: ${TASK_DELETED_RETENTION_DAYS:30}
      batch-size: ${TASK_DELETED_RETENTION_BATCH_SIZE:200}

app:
  base-url: ${APP_PUBLIC_URL:${WEBHOOK_BASE_URL:http://localhost:3000}}

# Horizontal scaling - async queue-based agent execution
# Enable with scaling.agent.queue.enabled=true
scaling:
  agent:
    queue:
      enabled: true
      # Shutdown drain window for the agent worker pool (loop executions run 1-65 min;
      # 10 min lets most streams finish, survivors are finalized as INTERRUPTED with
      # their partial content saved by conversation-service).
      drain-timeout-seconds: 600
    worker:
      agent-pool-size: 8
      classify-pool-size: 4
      guardrail-pool-size: 4
    consumer:
      poll-interval-ms: 100

# Credit consumption
credit:
  consumption:
    enabled: ${CREDIT_CONSUMPTION_ENABLED:true}

# Storage tracking
storage:
  s3:
    enabled: ${S3_ENABLED:false}

# Actuator health endpoint
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# Rate limiter wait-mode timeout - bumped 2026-04-29 from default 60s for split-aware
# bursts (e.g. 30-item Gmail classify at gemini-3-pro-preview rpm-per-tenant=5 needs
# 6 minutes to drain). Without this bump, queued items hit `rate_limit_timeout` at
# 60s and turn into fake failures. Bound by RateLimitConfig.java:23 (prefix=rate-limit).
rate-limit:
  max-wait-time-seconds: 600

logging:
  level:
    com.apimarketplace.agent: INFO
  file:
    name: logs/agent-service.log
